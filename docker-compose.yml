version: "3.8"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5001:5000"

    environment:
      - NODE_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
